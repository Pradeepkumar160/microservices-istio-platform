name: CI/CD — Build, Test & Deploy Microservices

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        docker build -t api-gateway:${{ github.sha }} ./services/api-gateway
        docker build -t auth-service:${{ github.sha }} ./services/auth-service
        docker build -t user-service:${{ github.sha }} ./services/user-service
        docker build -t product-service:${{ github.sha }} ./services/product-service
        docker build -t order-service:${{ github.sha }} ./services/order-service
        docker build -t notification-service:${{ github.sha }} ./services/notification-service

    - name: Start services with Docker Compose
      run: |
        docker compose up -d --build
        echo "Waiting for services to be healthy..."
        sleep 30

    - name: Run health checks
      run: |
        curl -f http://localhost:3001/health || exit 1
        curl -f http://localhost:3002/health || exit 1
        curl -f http://localhost:3003/health || exit 1
        curl -f http://localhost:3004/health || exit 1
        curl -f http://localhost:3005/health || exit 1
        echo "All health checks passed!"

    - name: Run integration tests
      run: |
        TOKEN=$(curl -sf -X POST http://localhost:3000/auth/login \
          -H "Content-Type: application/json" \
          -d '{"email":"admin@test.com","password":"password"}' | jq -r '.token')
        echo "Login test: PASSED"

        curl -sf http://localhost:3000/products > /dev/null
        echo "Products test: PASSED"

        curl -sf http://localhost:3000/users \
          -H "Authorization: Bearer $TOKEN" > /dev/null
        echo "Users test: PASSED"

        curl -sf -X POST http://localhost:3000/orders \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $TOKEN" \
          -d '{"userId":1,"productId":1,"quantity":1}' > /dev/null
        echo "Order creation test: PASSED"

        echo "All integration tests passed!"

    - name: Stop services
      if: always()
      run: docker compose down

  # ─── Deploy (only on main) ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push images
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        SERVICES=(api-gateway auth-service user-service product-service order-service notification-service)
        for svc in "${SERVICES[@]}"; do
          docker build \
            -t ghcr.io/${OWNER}/microservices/${svc}:${{ github.sha }} \
            -t ghcr.io/${OWNER}/microservices/${svc}:latest \
            ./services/${svc}
          docker push ghcr.io/${OWNER}/microservices/${svc}:${{ github.sha }}
          docker push ghcr.io/${OWNER}/microservices/${svc}:latest
        done

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml

    - name: Deploy to Kubernetes
      run: |
        export KUBECONFIG=kubeconfig.yaml
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        kubectl apply -f k8s/namespaces/
        kubectl apply -f k8s/services/
        kubectl apply -f k8s/istio/

        SERVICES=(api-gateway auth-service user-service product-service order-service notification-service)
        for svc in "${SERVICES[@]}"; do
          kubectl set image deployment/${svc} \
            ${svc}=ghcr.io/${OWNER}/microservices/${svc}:${{ github.sha }} \
            -n production
        done

        for svc in "${SERVICES[@]}"; do
          kubectl rollout status deployment/${svc} -n production --timeout=5m
        done

        echo "Deployment complete!"