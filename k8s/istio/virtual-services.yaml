##############################################################################
# PRODUCT SERVICE — Canary deployment (90% v1, 10% v2)
##############################################################################
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-service-vs
  namespace: production
spec:
  hosts:
  - product-service
  http:
  - route:
    - destination:
        host: product-service
        subset: v1
      weight: 90
    - destination:
        host: product-service
        subset: v2
      weight: 10
    timeout: 5s
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: "5xx,connect-failure"

---
##############################################################################
# ORDER SERVICE — Retries + timeout
##############################################################################
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: order-service-vs
  namespace: production
spec:
  hosts:
  - order-service
  http:
  - route:
    - destination:
        host: order-service
        port:
          number: 3004
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: "5xx,connect-failure,retriable-4xx"
    timeout: 15s
